name: Tests

on:
  push:
    branches:
      - main
    paths:
      - include/**
      - tests/**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:
    inputs:
      SDL_VERSION:
        description: "SDL version"
        required: false
        default: "2.32.10"
      SDL_IMAGE_VERSION:
        description: "SDL_image version"
        required: false
        default: "2.8.12"
      SDL_TTF_VERSION:
        description: "SDL_ttf version"
        required: false
        default: "2.24.0"
      SDL_MIXER_VERSION:
        description: "SDL_mixer version"
        required: false
        default: "2.8.2"

jobs:
  tests:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    strategy:
      matrix:
        include:
          - SDL_VERSION: 2.32.10
            SDL_IMAGE_VERSION: 2.8.12
            SDL_TTF_VERSION: 2.24.0
            SDL_MIXER_VERSION: 2.8.2

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install SDL dependencies
        uses: HandcrankEngine/install-sdl-packages@3dd8adf2ce1e6698313aecb05a2f8fa59be27b8c # v0.4.1
        with:
          SDL_VERSION: ${{ inputs.SDL_VERSION || matrix.SDL_VERSION }}
          SDL_IMAGE_VERSION: ${{ inputs.SDL_IMAGE_VERSION || matrix.SDL_IMAGE_VERSION }}
          SDL_TTF_VERSION: ${{ inputs.SDL_TTF_VERSION || matrix.SDL_TTF_VERSION }}
          SDL_MIXER_VERSION: ${{ inputs.SDL_MIXER_VERSION || matrix.SDL_MIXER_VERSION }}

      - name: Run tests
        run: ./bin/run-tests.sh
