name: Build

on:
  push:
    branches:
      - main
    paths:
      - include/**
      - tests/**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:
    inputs:
      SDL_VERSION:
        description: "SDL version"
        required: false
        default: "2.32.10"
      SDL_IMAGE_VERSION:
        description: "SDL_image version"
        required: false
        default: "2.8.10"
      SDL_TTF_VERSION:
        description: "SDL_ttf version"
        required: false
        default: "2.24.0"
      SDL_MIXER_VERSION:
        description: "SDL_mixer version"
        required: false
        default: "2.8.1"

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    strategy:
      matrix:
        include:
          - SDL_VERSION: 2.32.10
            SDL_IMAGE_VERSION: 2.8.10
            SDL_TTF_VERSION: 2.24.0
            SDL_MIXER_VERSION: 2.8.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SDL dependencies
        uses: HandcrankEngine/install-sdl-packages@v0.3.0
        with:
          SDL_VERSION: ${{ inputs.SDL_VERSION || matrix.SDL_VERSION }}
          SDL_IMAGE_VERSION: ${{ inputs.SDL_IMAGE_VERSION || matrix.SDL_IMAGE_VERSION }}
          SDL_TTF_VERSION: ${{ inputs.SDL_TTF_VERSION || matrix.SDL_TTF_VERSION }}
          SDL_MIXER_VERSION: ${{ inputs.SDL_MIXER_VERSION || matrix.SDL_MIXER_VERSION }}

      - name: Build and test
        working-directory: .github/workflows/
        run: |
          mkdir build
          (cd build/ && cmake ..)
          (cd build/ && cmake --build .)
